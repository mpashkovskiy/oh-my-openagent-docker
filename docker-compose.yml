x-common-volumes: &common-volumes
  - ../:/workspace
  - ${HOME}/.config/opencode:/root/.config/opencode
  - ${HOME}/.local/share/opencode:/root/.local/share/opencode
  - ${HOME}/.local/state/opencode:/root/.local/state/opencode
  - /var/run/docker.sock:/var/run/docker.sock

services:
  opencode-serve:
    build: .
    command: ["opencode", "serve", "--hostname", "0.0.0.0", "--port", "4096"]
    volumes: *common-volumes

  openagent:
    build: .
    command: ["opencode", "attach", "http://opencode-serve:4096"]
    stdin_open: true
    tty: true
    depends_on:
      - opencode-serve
    volumes: *common-volumes

  opencode-telegram:
    build: .
    command: ["opencode-telegram", "start"]
    environment:
      - OPENCODE_API_URL=http://opencode-serve:4096
    depends_on:
      - opencode-serve
    profiles: [telegram]
    volumes:
      - ${HOME}/.config/opencode:/root/.config/opencode
      - ${HOME}/.config/opencode-telegram-bot:/root/.config/opencode-telegram-bot
