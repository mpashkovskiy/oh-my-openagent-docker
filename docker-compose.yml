services:
  opencode-serve:
    build: .
    command: ["opencode", "serve", "--hostname", "0.0.0.0", "--port", "4096"]
    profiles: [telegram]
    volumes:
      - ../:/workspace
      - ~/.local/share/opencode:/root/.local/share/opencode
      - ~/.local/state/opencode:/root/.local/state/opencode
      - /var/run/docker.sock:/var/run/docker.sock

  opencode-telegram:
    build: .
    command: ["opencode-telegram", "start"]
    environment:
      - OPENCODE_API_URL=http://opencode-serve:4096
    depends_on:
      - opencode-serve
    profiles: [telegram]
    volumes:
      - ~/.config/opencode:/root/.config/opencode
      - ~/.config/opencode-telegram-bot:/root/.config/opencode-telegram-bot
